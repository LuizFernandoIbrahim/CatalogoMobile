appId: com.oficina.catalogo
---
- launchApp:
    clearState: true

# Login como admin
- tapOn: "E-mail"
- inputText: "admin@loja.com"
- tapOn: "Senha"
- inputText: "1234"
- tapOn: "Entrar"

# Navega para admin
- tapOn: "Admin"
- assertVisible: "Modo Administrador"

# Cria novo produto
- tapOn: "＋ Novo Produto"
- assertVisible: "Novo Produto"

- tapOn: "Nome do produto *"
- inputText: "Produto Teste Maestro"

- tapOn: "Preço (ex: 49.90) *"
- inputText: "99.90"

- tapOn: "Descrição"
- inputText: "Produto criado pelo Maestro"

- tapOn: "Decoração"

- tapOn: "Salvar"

- assertVisible: "Produto Teste Maestro"