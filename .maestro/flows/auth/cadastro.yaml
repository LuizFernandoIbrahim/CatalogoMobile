appId: com.oficina.catalogo
---
- launchApp:
    clearState: true

- assertVisible: "Oficina de Marias"

- tapOn: "Não tem conta? Cadastre-se"

- assertVisible: "Crie sua conta"

- tapOn: "Nome completo"
- inputText: "Maria Teste"

- tapOn: "E-mail"
- inputText: "maria_teste@email.com"

- tapOn: "Senha"
- inputText: "1234"

- tapOn: "Cadastrar"

- assertVisible: "Cadastro realizado!"
- tapOn: "OK"

- assertVisible: "Bem-vindo à nossa loja!"