appId: com.oficina.catalogo
---
- launchApp:
    clearState: true

# Faz login primeiro
- tapOn: "E-mail"
- inputText: "maria@email.com"
- tapOn: "Senha"
- inputText: "1234"
- tapOn: "Entrar"

# Navega para perfil e faz logout
- assertVisible: "Catálogo"
- tapOn: "Perfil"
- assertVisible: "maria@email.com"
- tapOn: "Sair da conta"

- assertVisible: "Oficina de Marias"