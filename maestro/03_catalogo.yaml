appId: com.oficina.catalogo
---
- launchApp

# Garante que já está logado e na tela do Catálogo
- assertVisible: "Catálogo"

# Header fixo do catálogo
- assertVisible: "Buscar produto..."

# Testar busca
- tapOn: "Buscar produto..."
- inputText: "Organizador"
- assertVisible: "Organizador de Mesa"
- eraseText
- assertVisible: "Moedor de Pimenta e Sal"

# Testar filtro de categoria
- tapOn: "Decoração"
- assertVisible: "Luminário de Mesa"
- tapOn: "Todos"

# Pull to refresh (sincroniza com Firebase)
- swipe:
    start: 50%, 30%
    end: 50%, 70%
- assertVisible: "Catálogo"

# Abrir detalhe de um produto
- tapOn: "Luminário de Mesa"
- extendedWaitUntil:
    visible: "Luminário de Mesa"
    timeout: 8000

# Voltar para o catálogo
- tapOn: "←"
- assertVisible: "Catálogo"
