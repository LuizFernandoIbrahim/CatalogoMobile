appId: com.oficina.catalogo
---
# ATENÇÃO: este flow depende da ordem de execução dos arquivos da pasta maestro/.
# 01_cadastro_admin.yaml roda DEPOIS de 01_cadastro.yaml (ordem alfabética) e usa
# clearState: true, apagando o usuário "maestro@teste.com" criado em 01_cadastro.
# Por isso aqui logamos com "admin@loja.com", que é o único usuário que sobrevive
# até este ponto da suíte. Se a ordem dos arquivos mudar, revise este e-mail.
- launchApp

# Caso o app já esteja logado (sessão persistida do flow anterior),
# pula direto para o catálogo. Caso contrário, faz login normalmente.
- runFlow:
    when:
      visible: "Bem-vindo à nossa loja!"
    commands:
      - tapOn: "E-mail"
      - inputText: "admin@loja.com"
      - tapOn: "Senha"
      - inputText: "1234"
      - tapOn: "Entrar"

      # Escolhendo "não" na biometria
      - runFlow:
          when:
            visible: "Ativar Biometria"
          commands:
            - tapOn: "Não"

# catalogscreen
- assertVisible: "Catálogo"
- assertVisible: "Buscar produto..."

# barra inferior
- assertVisible: "Mapa"
- assertVisible: "Perfil"